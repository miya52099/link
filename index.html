<script>
  function setupCarousel(carouselId) {
    const carousel = document.getElementById(carouselId);

    if (!carousel) return;

    let carouselTimer = null;
    let isPaused = false;

    function moveCarousel() {
      if (isPaused) return;

      const item = carousel.querySelector('img');
      if (!item) return;

      const gap = 10;
      const itemWidth = item.offsetWidth + gap;
      const maxScroll = carousel.scrollWidth - carousel.clientWidth;

      if (carousel.scrollLeft >= maxScroll - 5) {
        carousel.scrollTo({
          left: 0,
          behavior: 'smooth'
        });
      } else {
        carousel.scrollBy({
          left: itemWidth,
          behavior: 'smooth'
        });
      }
    }

    function startCarousel() {
      if (!carouselTimer) {
        carouselTimer = setInterval(moveCarousel, 2500);
      }
    }

    function pauseCarousel() {
      isPaused = true;
    }

    function resumeCarousel() {
      isPaused = false;
    }

    carousel.addEventListener('mouseenter', pauseCarousel);
    carousel.addEventListener('mouseleave', resumeCarousel);

    carousel.addEventListener('touchstart', pauseCarousel);
    carousel.addEventListener('touchend', () => {
      setTimeout(resumeCarousel, 1800);
    });

    carousel.addEventListener('mousedown', pauseCarousel);
    carousel.addEventListener('mouseup', () => {
      setTimeout(resumeCarousel, 1200);
    });

    startCarousel();
  }

  setupCarousel('igCarousel');
  setupCarousel('caseCarousel');
</script>
